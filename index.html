<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* 1. Base Styles (Home Default) */
        body, html {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9; 
            color: #333;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden; 
            transition: background-color 0.5s ease;
        }

        /* 2. Video & Overlay (Hidden by default in Home View) */
        .fullscreen-bg-video, .fullscreen-overlay {
            opacity: 0; 
            visibility: hidden;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .fullscreen-bg-video {
            object-fit: cover;
            z-index: -2; 
        }

        .fullscreen-overlay {
            background-color: rgba(0, 0, 0, 0.5); 
            z-index: -1; 
        }

        /* 3. The Layout Structure */
        .content-wrapper {
            position: relative;
            z-index: 1; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 4. Banner (Home View Defaults) */
        .banner {
            position: relative;
            width: 100%;
            height: 25vh;
            background-color: #c07a5f;
            background-image: 
                linear-gradient(to bottom, transparent 50%, #c07a5f 100%),
                url('./Bacground.jpg'); 
            background-size: cover; 
            background-position: center 65%; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease; 
        }
        
        /* 5. Main Content (Home View Defaults) */
        .main-content {
            flex-grow: 1; 
            background-color: #c07a5f;
            background-image: 
                linear-gradient(to top, transparent 50%, #c07a5f 100%),
                url('./IIEBM.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        /* =========================================
           6. ABOUT MODE STYLES (Triggered by JS)
           ========================================= */
        body.about-mode {
            background-color: transparent;
        }
        
        body.about-mode .fullscreen-bg-video,
        body.about-mode .fullscreen-overlay {
            opacity: 1; 
            visibility: visible;
        }

        body.about-mode .banner {
            height: 30vh;
            background-image: none; 
            background-color: transparent; 
        }

        body.about-mode .main-content {
            background-image: none;
            background-color: transparent;
        }

        /* Hides the frosted glass card to leave floating text */
        body.about-mode .card {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: none;
        }

        body.about-mode .about-text {
            color: #ffffff; 
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9); 
            font-size: 1.25rem; 
        }

        body.about-mode .about-text strong {
            color: #ff007f; 
        }

        body.about-mode .about-title {
            color: #ffffff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
            font-size: 2.2rem;
        }
        /* ========================================= */

        /* 7. The Profile Picture */
        .profile-img {
            position: absolute;
            left: 5vw;
            width: 16vh;
            height: 16vh;       
            border-radius: 50%;  
            object-fit: cover;
            object-position: center 58%; 
            border: 4px solid #ffffff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6);
        }

        /* 8. The Unique Name */
        .unique-name {
            font-size: clamp(2rem, 6vw, 4.5rem); 
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to right, #ff007f 0%, #7928ca 50%, #ff007f 100%);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 6px 5px rgba(0,0,0,0.9));
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 9. The Info Card (Glassmorphism) */
        .card {
            background-color: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); 
        }
        
        .bio { font-size: 1.2rem; color: #f4f4f9; line-height: 1.6; margin-top: 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #7928ca;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s ease;
        }
        .button:hover {
            background-color: #ff007f;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
            transform: translateY(-2px);
        }

        .about-text { text-align: left; font-size: 1.1rem; line-height: 1.8; color: #f4f4f9; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .about-title { color: #ff007f; margin-top: 0; margin-bottom: 20px; font-size: 1.8rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        /* --- Audio Toggle Button --- */
        #mute-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #mute-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* 10. Image Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-btn:hover { color: #ff007f; }
        /* =========================================
           11. MOBILE RESPONSIVENESS
           ========================================= */
        @media (max-width: 768px) {
            /* 1. Stack the banner items instead of overlapping */
            .banner {
                flex-direction: column;
                height: auto; 
                padding: 40px 10px 20px 10px; 
            }
            
            body.about-mode .banner {
                height: auto;
                padding-top: 50px; 
            }

            /* 2. Center the profile picture and stop it from floating left */
            .profile-img {
                position: relative; 
                left: auto;
                width: 130px;
                height: 130px;
                margin-bottom: 15px; 
            }

            /* 3. Center the name and adjust size */
            .unique-name {
                font-size: 2.2rem; 
                text-align: center;
                line-height: 1.2;
            }

            /* 4. Shrink the card padding so it fits narrow screens */
            .main-content {
                padding: 15px; 
            }

            .card {
                padding: 30px 20px; 
            }

            /* 5. Adjust text sizes for phone readability */
            .bio, .about-text {
                font-size: 1.05rem; 
            }
            
            .about-title {
                font-size: 1.6rem; 
            }
            
            body.about-mode .about-title {
                font-size: 1.8rem;
            }

            /* 6. Move the modal close button so it's easier to tap */
            .close-btn {
                top: 15px;
                right: 25px;
                font-size: 45px;
            }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="fullscreen-bg-video">
        <source src="vidssave.mp4" type="video/mp4">
    </video>
    <div class="fullscreen-overlay"></div>
    <button id="mute-btn" onclick="toggleMute()">🔇 Sound Off</button>

    <div class="content-wrapper">
        <div class="banner">
            <img src="./profile.jpeg" alt="My Profile Picture" class="profile-img" onclick="openModal()">
            <h1 class="unique-name">Harsh Sharma</h1>
        </div>

        <div class="main-content">
            <div class="card">
                
                <div id="home-section">
                    <p class="bio" id="dynamic-bio">Loading bio...</p>
                    <a href="#" class="button" onclick="showAbout(event)">About me</a>
                </div>

                <div id="about-section" style="display: none;">
                    <h2 class="about-title">A Little More About Me</h2>
                    <div class="about-text">
                        <p><strong>Education:</strong> <span id="dynamic-edu">Loading education...</span></p>
                        <p><strong>Interests:</strong> <span id="dynamic-interest">Loading interests...</span></p>
                        <p><strong>My Goal:</strong> <span id="dynamic-goal">Loading goals...</span></p>
                    </div>
                    <a href="#" class="button" onclick="showHome(event)">Go Back</a>
                </div>

            </div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img class="modal-content" src="./profile.jpeg" alt="Full Profile Picture">
    </div>

    <script>
        function openModal() { document.getElementById("imageModal").style.display = "flex"; }
        function closeModal() { document.getElementById("imageModal").style.display = "none"; }
        
        function showAbout(event) {
            event.preventDefault();
            document.getElementById("home-section").style.display = "none";
            document.getElementById("about-section").style.display = "block";
            document.body.classList.add("about-mode");
        }
        
        function showHome(event) {
            event.preventDefault();
            document.getElementById("about-section").style.display = "none";
            document.getElementById("home-section").style.display = "block";
            document.body.classList.remove("about-mode");
        }
        function toggleMute() {
            const video = document.querySelector('.fullscreen-bg-video');
            const btn = document.getElementById('mute-btn');
            
            if (video.muted) {
                video.muted = false; // Turns sound ON
                btn.innerText = "🔊 Sound On"; // Changes button text
            } else {
                video.muted = true; // Turns sound OFF
                btn.innerText = "🔇 Sound Off";
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // IMPORTANT: Replace this block with your actual keys from the Firebase Dashboard!
        const firebaseConfig = {
    apiKey: "AIzaSyAHYUhxByRHwv34sOemsBXUpZtULGJY6SE",
    authDomain: "portfolio-9dc7d.firebaseapp.com",
    projectId: "portfolio-9dc7d",
    storageBucket: "portfolio-9dc7d.firebasestorage.app",
    messagingSenderId: "629658202357",
    appId: "1:629658202357:web:a038f54c81984c9f90d5bc",
    measurementId: "G-GXBR3W4WP9"
  };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch data from Firebase and update the page
        async function loadContent() {
            try {
                const querySnapshot = await getDocs(collection(db, "portfolio_content"));
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    // Maps database fields to HTML IDs
                    if(data.bio_text) document.getElementById("dynamic-bio").innerText = data.bio_text;
                    if(data.education_text) document.getElementById("dynamic-edu").innerText = data.education_text;
                    if(data.interest_text) document.getElementById("dynamic-interest").innerText = data.interest_text;
                    if(data.goal_text) document.getElementById("dynamic-goal").innerText = data.goal_text;
                });
            } catch (error) {
                console.error("Error fetching Firebase data:", error);
                document.getElementById("dynamic-bio").innerText = "Error loading content. Please check console.";
            }
        }

        // Run the fetch function instantly when the page loads
        loadContent();
    </script>
</body>
</html>
